<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학원 점검 플레이북</title>
<!-- ✅ 개선 1: 폰트 preconnect + font-display: swap -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0e1a; --panel:#111827; --panel2:#1a2235;
    --accent:#f59e0b; --accent2:#3b82f6;
    --danger:#ef4444; --success:#10b981;
    --text:#e2e8f0; --text-dim:#94a3b8;
    --border:rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ✅ 개선 2: will-change로 GPU 가속 힌트 */
  .scene-image {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
    border-radius: 12px;
    will-change: opacity;
    transition: opacity 0.3s ease;
  }

  /* ✅ 개선 3: 이미지 placeholder 스타일 */
  .scene-image-container {
    position: relative;
    background: var(--panel2);
    border-radius: 12px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene-image-container.loading::before {
    content: '🖼️ 이미지 로딩 중...';
    color: var(--text-dim);
    font-size: 0.9rem;
  }

  .scene-image-container.no-image::before {
    content: '📷';
    font-size: 3rem;
    opacity: 0.3;
  }

  /* 로딩 화면 */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.3s ease;
  }

  .loader-logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; }
  .loader-bar { width: 200px; height: 4px; background: var(--panel2); border-radius: 2px; overflow: hidden; }
  .loader-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s ease; }
  .loader-txt { margin-top: 16px; color: var(--text-dim); font-size: 0.85rem; }

  #app { display: none; flex-direction: column; min-height: 100vh; }

  .header {
    padding: 16px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-title { font-weight: 700; font-size: 1.1rem; }
  .header-badge { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }

  .game-area { flex: 1; padding: 20px; max-width: 600px; margin: 0 auto; width: 100%; }

  .scene-card {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    /* ✅ 개선 4: 애니메이션 최적화 */
    animation: fadeSlideIn 0.4s ease;
    will-change: transform, opacity;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .location-tag {
    display: inline-block;
    background: var(--panel2);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .speaker { color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  .story-text { line-height: 1.7; font-size: 0.95rem; }

  .choice-question { font-weight: 600; margin-bottom: 16px; line-height: 1.5; }

  .choice-btn {
    width: 100%;
    padding: 16px;
    margin-bottom: 10px;
    background: var(--panel2);
    border: 2px solid transparent;
    border-radius: 12px;
    color: var(--text);
    font-size: 0.9rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s ease;
    /* ✅ 개선 5: 버튼 터치 반응성 */
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .choice-btn:hover { border-color: var(--accent); transform: translateX(4px); }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn.correct { background: rgba(16,185,129,0.2); border-color: var(--success); }
  .choice-btn.wrong { background: rgba(239,68,68,0.2); border-color: var(--danger); }
  .choice-btn:disabled { cursor: not-allowed; opacity: 0.7; }

  .choice-label { 
    display: inline-block; 
    width: 28px; height: 28px; 
    background: var(--accent); 
    color: #000;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    font-weight: 700;
    margin-right: 12px;
  }

  .nav-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 16px;
  }

  .nav-btn:hover { filter: brightness(1.1); }
  .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .feedback-box {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    animation: fadeSlideIn 0.3s ease;
  }

  .feedback-box.correct { background: rgba(16,185,129,0.15); border-left: 4px solid var(--success); }
  .feedback-box.wrong { background: rgba(239,68,68,0.15); border-left: 4px solid var(--danger); }

  .feedback-title { font-weight: 700; margin-bottom: 8px; }
  .feedback-text { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }

  .score-display {
    text-align: center;
    padding: 12px;
    background: var(--panel2);
    border-radius: 10px;
    margin-bottom: 16px;
  }

  .score-label { font-size: 0.8rem; color: var(--text-dim); }
  .score-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

  .done-screen, .error-screen { 
    display: none; 
    text-align: center; 
    padding: 40px 20px; 
  }

  .done-icon { font-size: 4rem; margin-bottom: 20px; }
  .done-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
  .done-msg { color: var(--text-dim); line-height: 1.6; }

  /* 프로그레스 바 */
  .progress-bar {
    height: 4px;
    background: var(--panel2);
    border-radius: 2px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-logo">📋 학원 점검 플레이북</div>
  <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
  <div class="loader-txt" id="loader-txt">시나리오 불러오는 중...</div>
</div>

<div id="app">
  <div class="header">
    <div class="header-title">📋 학원 점검 플레이북</div>
    <div class="header-badge" id="hdr-month"></div>
  </div>

  <div class="game-area" id="game-area">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-display">
      <div class="score-label">현재 점수</div>
      <div class="score-value" id="score-display">0 / 0</div>
    </div>
    <div id="scene-container"></div>
  </div>

  <div class="done-screen" id="done-screen">
    <div class="done-icon">🎉</div>
    <div class="done-title">참여 감사합니다!</div>
    <div class="done-msg">응답이 성공적으로 저장되었습니다.<br>여러분의 의견이 더 나은 학원 운영 교육을 만드는 데 활용됩니다.</div>
  </div>

  <div class="error-screen" id="error-screen">
    <div style="font-size:2.5rem;margin-bottom:12px">⚠️</div>
    <div style="font-size:1.2rem;font-weight:700;color:var(--danger);margin-bottom:10px">시나리오 없음</div>
    <div style="font-size:0.84rem;color:var(--text-dim);">시나리오 데이터를 불러올 수 없습니다.</div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// 설정
// ══════════════════════════════════════
const CFG = {
  USE_SHEETS: false,  // true면 Google Sheets에서 로드
  SHEET_URL: ''
};

// ══════════════════════════════════════
// ✅ 개선된 데모 시나리오 (이미지 URL 처리)
// ══════════════════════════════════════
const DEMO = {
  month: '2025년 3월',
  title: '신규 학원 운영자 편',
  video_url: null,  // ✅ 빈 문자열 대신 null 사용
  steps: [
    {
      type: 'story',
      location: '📍 학원 등록 사무소 앞',
      speaker: '나레이터',
      image: null,  // ✅ 빈 문자열 대신 null 사용
      text: '드디어 학원등록증을 받았습니다! "학원등록증 발급이 완료되었습니다." 이제 뭘 해야 할까요?'
    },
    {
      type: 'choice',
      location: '📍 학원 등록 사무소 앞',
      image: null,
      question: '학원등록증을 받은 후 어떻게 하시겠어요?',
      choices: [
        { label: 'A', text: '집으로 곧장 가서 쉰다. 등록증만 받으면 끝!', correct: false },
        { label: 'B', text: '학원 운영에 필요한 다른 인허가 사항을 확인한다.', correct: true },
        { label: 'C', text: '바로 광고를 시작한다.', correct: false }
      ],
      feedback: {
        correct: '정답입니다! 학원등록증 외에도 사업자등록, 소방시설 점검 등 여러 인허가가 필요합니다.',
        wrong: '학원등록증만으로는 운영이 불가능합니다. 추가 인허가 사항을 확인해야 합니다.'
      }
    },
    {
      type: 'story',
      location: '📍 학원 내부',
      speaker: '점검관',
      image: null,
      text: '안녕하세요, 정기 점검 나왔습니다. 학원 시설을 확인하겠습니다.'
    },
    {
      type: 'choice',
      location: '📍 학원 내부',
      image: null,
      question: '점검관이 소화기 위치를 묻습니다. 어떻게 대응하시겠어요?',
      choices: [
        { label: 'A', text: '소화기가 어디 있는지 잘 모르겠다고 솔직히 말한다.', correct: false },
        { label: 'B', text: '각 층 비상구 근처에 비치되어 있다고 안내한다.', correct: true },
        { label: 'C', text: '소화기는 필요 없다고 말한다.', correct: false }
      ],
      feedback: {
        correct: '훌륭합니다! 소화기는 각 층마다 비상구 근처에 비치해야 하며, 위치를 명확히 알고 있어야 합니다.',
        wrong: '소화기 위치는 학원 운영자가 반드시 숙지하고 있어야 합니다. 소방 점검 시 중요한 항목입니다.'
      }
    },
    {
      type: 'story',
      location: '📍 학원 내부',
      speaker: '나레이터',
      image: null,
      text: '점검이 끝났습니다. 오늘 배운 내용을 잘 기억해두세요!'
    }
  ]
};

// ══════════════════════════════════════
// 게임 상태
// ══════════════════════════════════════
let SC = null;
let currentStep = 0;
let score = 0;
let maxScore = 0;
let answers = [];
let canProceed = false;

// ══════════════════════════════════════
// DOM 요소
// ══════════════════════════════════════
const $ = id => document.getElementById(id);

// ══════════════════════════════════════
// ✅ 개선된 초기화 함수
// ══════════════════════════════════════
async function init() {
  const loading = $('loading');
  const loaderFill = $('loader-fill');
  const loaderTxt = $('loader-txt');

  // 로딩 진행률 업데이트 함수
  const updateProgress = (percent, text) => {
    loaderFill.style.width = percent + '%';
    loaderTxt.textContent = text;
  };

  try {
    updateProgress(20, '시나리오 준비 중...');

    // ✅ 개선: 실제 데이터 로딩에 맞춰 진행
    if (CFG.USE_SHEETS && CFG.SHEET_URL) {
      updateProgress(40, 'Google Sheets 연결 중...');
      // Google Sheets에서 로드하는 로직
      // const data = await fetchFromSheets();
      // SC = parseSheetData(data);
    } else {
      SC = DEMO;
    }

    updateProgress(60, '시나리오 검증 중...');

    // 시나리오 검증
    if (!SC || !SC.steps || SC.steps.length === 0) {
      throw new Error('시나리오 데이터가 없습니다.');
    }

    // 최대 점수 계산
    SC.steps.forEach(step => {
      if (step.type === 'choice') maxScore++;
    });

    updateProgress(80, '이미지 프리로드 중...');

    // ✅ 개선: 이미지 프리로드
    await preloadImages();

    updateProgress(100, '완료!');

    // 약간의 딜레이 후 게임 시작
    await delay(500);

    // 로딩 화면 숨기기
    loading.style.opacity = '0';
    await delay(300);
    loading.style.display = 'none';

    // 앱 표시
    $('app').style.display = 'flex';
    $('hdr-month').textContent = SC.month || '';

    // 첫 씬 렌더링
    renderScene();

  } catch (error) {
    console.error('초기화 오류:', error);
    loading.style.display = 'none';
    $('app').style.display = 'flex';
    $('game-area').style.display = 'none';
    $('error-screen').style.display = 'block';
  }
}

// ✅ 딜레이 유틸리티
function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

// ✅ 개선된 이미지 프리로드
async function preloadImages() {
  const imageUrls = SC.steps
    .map(step => step.image)
    .filter(url => url && url.trim() !== '');  // ✅ null, undefined, 빈문자열 필터링

  if (imageUrls.length === 0) return;

  const promises = imageUrls.map(url => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = resolve;
      img.onerror = resolve;  // 실패해도 계속 진행
      img.src = url;
    });
  });

  // 최대 3초 대기
  await Promise.race([
    Promise.all(promises),
    delay(3000)
  ]);
}

// ══════════════════════════════════════
// ✅ 개선된 씬 렌더링
// ══════════════════════════════════════
function renderScene() {
  const step = SC.steps[currentStep];
  const container = $('scene-container');

  // 진행률 업데이트
  const progress = ((currentStep + 1) / SC.steps.length) * 100;
  $('progress-fill').style.width = progress + '%';

  // 점수 업데이트
  $('score-display').textContent = score + ' / ' + maxScore;

  let html = '<div class="scene-card">';

  // 위치 태그
  if (step.location) {
    html += '<div class="location-tag">' + escapeHtml(step.location) + '</div>';
  }

  // ✅ 개선된 이미지 처리
  if (step.image && step.image.trim() !== '') {
    html += '<div class="scene-image-container loading" id="img-container">';
    html += '<img class="scene-image" src="' + escapeHtml(step.image) + '" ';
    html += 'alt="장면 이미지" ';
    html += 'onload="this.parentElement.classList.remove(\'loading\')" ';
    html += 'onerror="handleImageError(this)">';
    html += '</div>';
  }

  if (step.type === 'story') {
    // 스토리 씬
    if (step.speaker) {
      html += '<div class="speaker">' + escapeHtml(step.speaker) + '</div>';
    }
    html += '<div class="story-text">' + escapeHtml(step.text) + '</div>';
    html += '<button class="nav-btn" onclick="nextScene()">다음 →</button>';

  } else if (step.type === 'choice') {
    // 선택지 씬
    html += '<div class="choice-question">' + escapeHtml(step.question) + '</div>';

    step.choices.forEach((choice, idx) => {
      html += '<button class="choice-btn" data-idx="' + idx + '" onclick="selectChoice(' + idx + ')">';
      html += '<span class="choice-label">' + choice.label + '</span>';
      html += escapeHtml(choice.text);
      html += '</button>';
    });

    html += '<div id="feedback-area"></div>';
    html += '<button class="nav-btn" id="next-btn" style="display:none" onclick="nextScene()">다음 →</button>';
  }

  html += '</div>';

  // ✅ 개선: requestAnimationFrame으로 렌더링 최적화
  requestAnimationFrame(() => {
    container.innerHTML = html;
  });
}

// ✅ 이미지 에러 처리
function handleImageError(img) {
  const container = img.parentElement;
  container.classList.remove('loading');
  container.classList.add('no-image');
  img.style.display = 'none';
}

// HTML 이스케이프
function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// 선택지 선택
function selectChoice(idx) {
  const step = SC.steps[currentStep];
  const choice = step.choices[idx];
  const buttons = document.querySelectorAll('.choice-btn');

  // 모든 버튼 비활성화
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (step.choices[i].correct) {
      btn.classList.add('correct');
    } else if (i === idx) {
      btn.classList.add('wrong');
    }
  });

  // 점수 계산
  if (choice.correct) {
    score++;
  }

  // 답변 기록
  answers.push({
    step: currentStep,
    selected: idx,
    correct: choice.correct
  });

  // 피드백 표시
  const feedbackArea = $('feedback-area');
  const feedbackClass = choice.correct ? 'correct' : 'wrong';
  const feedbackTitle = choice.correct ? '✅ 정답!' : '❌ 오답';
  const feedbackText = choice.correct ? step.feedback.correct : step.feedback.wrong;

  feedbackArea.innerHTML = 
    '<div class="feedback-box ' + feedbackClass + '">' +
    '<div class="feedback-title">' + feedbackTitle + '</div>' +
    '<div class="feedback-text">' + escapeHtml(feedbackText) + '</div>' +
    '</div>';

  // 점수 업데이트
  $('score-display').textContent = score + ' / ' + maxScore;

  // 다음 버튼 표시
  $('next-btn').style.display = 'block';
}

// 다음 씬으로
function nextScene() {
  currentStep++;

  if (currentStep >= SC.steps.length) {
    // 게임 완료
    showComplete();
  } else {
    renderScene();
  }
}

// 완료 화면
function showComplete() {
  $('game-area').style.display = 'none';
  $('done-screen').style.display = 'block';

  // 최종 점수 표시 추가
  const doneMsg = $('done-screen').querySelector('.done-msg');
  doneMsg.innerHTML = 
    '최종 점수: <strong>' + score + ' / ' + maxScore + '</strong><br><br>' +
    '응답이 성공적으로 저장되었습니다.<br>' +
    '여러분의 의견이 더 나은 학원 운영 교육을 만드는 데 활용됩니다.';
}

// ══════════════════════════════════════
// ✅ 개선: DOMContentLoaded + load 이벤트 최적화
// ══════════════════════════════════════
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>

</body>
</html>
